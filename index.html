<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital 24 - Smart Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa') no-repeat center center/cover;
            transition: 1s; overflow: hidden;
        }
        .card {
            width: 380px; padding: 40px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center; color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        #dashboard { display: none; width: 80%; max-width: 800px; }
        h2 { margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.2);
            border: none; border-radius: 10px; color: white; outline: none;
        }
        .btn {
            width: 100%; padding: 12px; background: #fff; color: #333;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #4caf50; color: white; }
        .social-icons { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .social-icons i {
            font-size: 22px; cursor: pointer; padding: 12px;
            background: rgba(255,255,255,0.1); border-radius: 50%; transition: 0.3s;
        }
        .social-icons i:hover { transform: scale(1.2); background: #fff; color: #333; }
        
        /* Dashboard Layout */
        .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body id="bg">

    <div class="card" id="loginPage">
        <h2>Login to Digital 24</h2>
        <div class="input-group"><input type="email" id="email" placeholder="Email Address"></div>
        <div class="input-group"><input type="password" id="password" placeholder="Password"></div>
        <button class="btn" onclick="emailLogin()">Login Now</button>

        <p style="margin-top: 15px; font-size: 14px; opacity: 0.8;">Or login with</p>
        <div class="social-icons">
            <i class="fab fa-google" onclick="login('google')" title="Google"></i>
            <i class="fab fa-facebook-f" onclick="login('facebook')" title="Facebook"></i>
            <i class="fab fa-github" onclick="login('github')" title="GitHub"></i>
        </div>
    </div>

    <div class="card" id="dashboard">
        <h2 id="welcomeText">Welcome!</h2>
        <p>You have successfully logged in to your dashboard.</p>
        <div class="dash-grid">
            <div class="box"><h4>Services</h4><p>Active</p></div>
            <div class="box"><h4>Wallet</h4><p>₹ 0.00</p></div>
            <div class="box"><h4>Status</h4><p>Online</p></div>
        </div>
        <button class="btn" onclick="logout()" style="margin-top: 20px; background: #ff4757; color: white;">Logout</button>
    </div>

    <script>
        // 1. Firebase Configuration (এখানে আপনার নিজের ডাটা বসান)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-project-id.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project-id.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 2. Social Login Function
        function login(type) {
            let provider;
            if(type === 'google') provider = new firebase.auth.GoogleAuthProvider();
            if(type === 'facebook') provider = new firebase.auth.FacebookAuthProvider();
            if(type === 'github') provider = new firebase.auth.GithubAuthProvider();

            auth.signInWithPopup(provider)
                .then((result) => {
                    document.getElementById('welcomeText').innerText = "Welcome, " + result.user.displayName;
                    showDashboard();
                }).catch((error) => {
                    alert(error.message);
                });
        }

        // 3. Email/Password Login (Demo)
        function emailLogin() {
            // আসল ইমেইল লগইন এর জন্য auth.signInWithEmailAndPassword ব্যবহার করা যায়
            showDashboard(); 
        }

        function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.body.style.background = "#121212";
        }

        function logout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }

        // Background Auto Change
        const imgs = ['https://images.unsplash.com/photo-1451187580459-43490279c0fa', 'https://images.unsplash.com/photo-1518770660439-4636190af475'];
        let idx = 0;
        setInterval(() => {
            document.getElementById('bg').style.backgroundImage = ⁠ url('${imgs[idx]}') ⁠;
            idx = (idx + 1) % imgs.length;
        }, 5000);
    </script>
</body>
</html>
